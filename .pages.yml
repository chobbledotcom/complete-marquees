media:
  input: images
  output: /images
  path: images
  categories: [image]
content:

  - name: pages
    label: Pages
    path: pages
    type: collection
    subfolders: false
    view:
      fields: [permalink, meta_title, header_text]
      primary: header_text
      sort: [header_text]
    fields:
      - { name: header_image, type: image, label: Header Image }
      - { name: header_text, type: string, label: Header Text }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: body, label: Body, type: code, options: { language: markdown } }
      - { name: meta_description, type: string, label: Meta Description }
      - { name: meta_title, type: string, label: Meta Title }
      - name: eleventyNavigation
        label: Navigation
        type: object
        fields:
          - { name: key, type: string }
          - { name: order, type: number }
          - { name: url, type: string }
      - { name: layout, type: string }
      - { name: permalink, type: string }

  - name: service-pages
    label: Service Pages
    path: service-pages
    type: collection
    subfolders: false
    view:
      fields: [permalink, breadcrumb_name, date_modified]
      primary: breadcrumb_name
      sort: [breadcrumb_name]
    fields:
      - { name: title, type: string, label: Title (raw, used in JSON-LD) }
      - { name: title_html, type: string, label: Title (HTML-escaped, optional) }
      - { name: description, type: string, label: Description (raw) }
      - { name: description_html, type: string, label: Description (HTML-escaped, optional) }
      - { name: breadcrumb_name, type: string, label: Breadcrumb Label }
      - { name: og_image, type: string, label: OG Image URL }
      - { name: og_image_width, type: number, label: OG Image Width (optional) }
      - { name: og_image_height, type: number, label: OG Image Height (optional) }
      - { name: og_image_type, type: string, label: OG Image MIME (optional) }
      - { name: thumbnail_url, type: string, label: JSON-LD Thumbnail URL }
      - { name: image_caption, type: string, label: Image Caption (only if known) }
      - { name: image_width, type: number, label: Image Width (JSON-LD) }
      - { name: image_height, type: number, label: Image Height (JSON-LD) }
      - { name: date_published, type: string, label: Date Published (ISO 8601) }
      - { name: date_modified, type: string, label: Date Modified (ISO 8601) }
      - { name: reading_time, type: string, label: Reading Time }
      - { name: body_class, type: string, label: Body CSS Class }
      - { name: nav_current, type: string, label: Active Nav Key (e.g. "wedding") }
      - { name: redirect_from, type: string, list: true, label: Redirect From }
      - { name: body, label: Body (HTML), type: code, options: { language: html } }
      - { name: layout, type: string }
      - { name: permalink, type: string }

  - name: locations
    label: Locations
    path: locations
    type: collection
    subfolders: false
    view:
      fields: [breadcrumb_name, title, date_modified]
      primary: breadcrumb_name
      sort: [breadcrumb_name]
    fields:
      - { name: title, type: string, label: Title (raw, used in JSON-LD) }
      - { name: title_html, type: string, label: Title (HTML-escaped, optional) }
      - { name: description, type: string, label: Description (raw) }
      - { name: description_html, type: string, label: Description (HTML-escaped, optional) }
      - { name: breadcrumb_name, type: string, label: Breadcrumb Label }
      - { name: og_image, type: string, label: OG Image URL }
      - { name: thumbnail_url, type: string, label: JSON-LD Thumbnail URL }
      - { name: date_published, type: string, label: Date Published (ISO 8601) }
      - { name: date_modified, type: string, label: Date Modified (ISO 8601) }
      - { name: reading_time, type: string, label: Reading Time }
      - { name: map_embed, type: string, label: Google Maps Embed URL (optional) }
      - { name: body, label: Body (HTML), type: code, options: { language: html } }
      - { name: layout, type: string }
      - { name: permalink, type: string }

  - name: reviews
    label: Reviews
    path: reviews
    type: collection
    subfolders: false
    fields:
      - { name: name, type: string, label: Name }
      - { name: date, type: date, label: Date (controls sort order; newest first) }
      - { name: homepage_excerpt, type: text, label: Homepage Excerpt (single-line summary for the homepage strip) }
      - { name: body, label: Body (HTML), type: code, options: { language: html } }
      - { name: url, type: string, label: URL (optional source link) }

  - name: homepage
    label: Homepage
    type: file
    path: _data/homepage.json
    fields:
      - name: hero
        label: Hero
        type: object
        fields:
          - { name: title, type: string, label: Hero Title }
          - { name: body, type: text, label: Hero Body Text }
          - name: primary_cta
            label: Primary CTA Button
            type: object
            fields:
              - { name: url, type: string }
              - { name: label, type: string }
          - name: secondary_cta
            label: Secondary CTA Button
            type: object
            fields:
              - { name: url, type: string }
              - { name: label, type: string }
          - { name: image_before, type: string, label: Slider Before Image URL }
          - { name: image_before_alt, type: string, label: Before Image Alt }
          - { name: image_after, type: string, label: Slider After Image URL }
          - { name: image_after_alt, type: string, label: After Image Alt }
      - name: service_cards
        label: Service Cards (4)
        type: object
        list: true
        fields:
          - { name: id, type: string, label: HTML ID (e.g. "wedding__marquees") }
          - { name: image_src, type: string, label: Image URL }
          - { name: image_alt, type: string, label: Image Alt }
          - { name: title, type: string, label: Card Title }
          - { name: description, type: text, label: Card Description }
          - { name: link_url, type: string, label: Link URL }
          - { name: link_text, type: string, label: Link Button Text }

  - name: nav
    label: Header Navigation
    type: file
    path: _data/nav.json
    fields:
      - name: items
        type: object
        list: true
        fields:
          - { name: key, type: string, label: Active Key (matches nav_current frontmatter) }
          - { name: url, type: string, label: URL }
          - { name: label, type: string, label: Label (raw HTML allowed) }
          - { name: title, type: string, label: Title attribute }
          - { name: page_item, type: number, label: WordPress page-item-NN class number }
          - { name: menu_item, type: number, label: WordPress menu-item-NN class number }
          - { name: is_home, type: boolean, label: Home item (gets menu-item-home class) }

  - name: site
    label: Site Configuration
    type: file
    path: _data/site.json
    fields:
      - { name: name, type: string, label: Site Name }
      - { name: url, type: string, label: Site URL }
      - name: phone
        label: Phone Number
        type: object
        fields:
          - { name: display, type: string, label: Display Format (e.g. "02392 717 925") }
          - { name: tel, type: string, label: Tel Link Format (digits only) }
      - { name: email, type: string, label: Contact Email }
      - name: opening_times
        label: Opening Times
        type: object
        list: true
        fields:
          - { name: day, type: string, label: Day, required: true }
          - { name: hours, type: string, label: Hours, required: true }
      - name: socials
        label: Social Media Links
        type: object
        fields:
          - { name: Facebook, type: string, label: Facebook }
          - { name: Instagram, type: string, label: Instagram }
          - { name: TikTok, type: string, label: TikTok }
          - { name: Google, type: string, label: Google }
          - { name: WhatsApp, type: string, label: WhatsApp }
          - { name: RSS, type: string, label: RSS }

  - name: meta
    label: Meta Configuration
    type: file
    path: _data/meta.json
    fields:
      - { name: language, type: string, label: Language Code, default: "en-GB" }
      - name: organization
        label: Organization
        type: object
        fields:
          - { name: description, type: string, label: Organization Description }
          - name: address
            label: Address
            type: object
            fields:
              - { name: streetAddress, type: string, label: Street Address }
              - { name: addressLocality, type: string, label: City }
              - { name: addressRegion, type: string, label: Region/State }
              - { name: postalCode, type: string, label: Postal Code }
              - { name: addressCountry, type: string, label: Country Code }
          - name: contactPoint
            label: Contact Points
            type: object
            list: true
            fields:
              - { name: telephone, type: string, label: Telephone }
              - { name: contactType, type: string, label: Contact Type }
              - { name: areaServed, type: string, label: Area Served }
              - { name: availableLanguage, type: string, label: Available Languages, list: true }
