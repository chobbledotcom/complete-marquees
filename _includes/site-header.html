<header>
  <div class="container--large">

    <div class="logo">

      <a href="/" rel="home">


        <img src="/wp-content/uploads/2016/07/logo.png" alt="Complete Marquees">


      </a>

    </div>

    <!--
-->
    <div class="contact__info">
      <span class="header__text">make your event extra special</span>

      <div class="telephone__number"><span class="callustoday">Call Us Today</span> <a href="tel:{{ site.phone.tel }}">{{ site.phone.display }}</a></div>


      <a href="mailto:{{ site.email }}" class="email">Email: {{ site.email }}</a>
    </div>
  </div>
</header>

<div id="navigation">
  <div class="container--large">
    <div id="mobile__menu">
      <div class="mobile__nav__trigger">
        <i class="fa fa-bars" aria-hidden="true"></i>
      </div><!--
    --><a class="fixednumber rulertel" href="tel:{{ site.phone.tel }}">{{ site.phone.display }}</a>
    </div>
    <div id="desktop__nav">
      <div class="menu-header-menu-container">
        <ul id="menu-header-menu" class="menu">
{%- for item in nav %}
          <li id="menu-item-{{ item.menu_item }}" class="menu-item menu-item-type-post_type menu-item-object-page{% if item.is_home %} menu-item-home{% endif %}{% if current == item.key %} current-menu-item page_item page-item-{{ item.page_item }} current_page_item{% endif %} menu-item-{{ item.menu_item }}"><a href="{% if current == item.key %}./{% else %}{{ item.url }}{% endif %}"{% if current == item.key %} aria-current="page"{% endif %} title="{{ item.title }}">{{ item.label }}</a></li>
{%- endfor %}
        </ul>
      </div>
    </div>
    <div id="mobile__nav">
      <div class="mobile__nav__close"><i class="fa fa-times" aria-hidden="true"></i></div>
      <div class="menu-header-menu-container">
        <ul id="menu-header-menu-1" class="menu">
{%- for item in nav %}
          <li class="menu-item menu-item-type-post_type menu-item-object-page{% if item.is_home %} menu-item-home{% endif %}{% if current == item.key %} current-menu-item page_item page-item-{{ item.page_item }} current_page_item{% endif %} menu-item-{{ item.menu_item }}"><a href="{% if current == item.key %}./{% else %}{{ item.url }}{% endif %}"{% if current == item.key %} aria-current="page"{% endif %} title="{{ item.title }}">{{ item.label }}</a></li>
{%- endfor %}
        </ul>
      </div>
    </div>
  </div>
</div>
