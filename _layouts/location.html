{%- assign title_h = title_html | default: title -%}
{%- assign meta_description_h = meta_description_html | default: meta_description -%}
{% include "html-head-open.html" %}
  <title>{{ title_h }}</title>
  <meta name="description" content="{{ meta_description_h }}" />
  <link rel="canonical" href="./" />
  <meta property="og:locale" content="en_GB" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{ title_h }}" />
  <meta property="og:description" content="{{ meta_description_h }}" />
  <meta property="og:url" content="https://www.completemarquees.co.uk{{ page.url }}" />
  <meta property="og:site_name" content="Complete Marquees" />
  <meta property="article:publisher" content="https://www.facebook.com/completemarquees/" />
  <meta property="article:modified_time" content="{{ date_modified }}" />
  <meta property="og:image" content="{{ og_image }}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@completemarquee" />
  <meta name="twitter:label1" content="Estimated reading time" />
  <meta name="twitter:data1" content="{{ reading_time }}" />
  <script type="application/ld+json" class="yoast-schema-graph">
    {
      "@context": "https://schema.org",
      "@graph": [{
        "@type": "WebPage",
        "@id": "https://www.completemarquees.co.uk{{ page.url }}",
        "url": "https://www.completemarquees.co.uk{{ page.url }}",
        "name": "{{ title }}",
        "isPartOf": {
          "@id": "https://www.completemarquees.co.uk/#website"
        },
        "primaryImageOfPage": {
          "@id": "https://www.completemarquees.co.uk{{ page.url }}#primaryimage"
        },
        "image": {
          "@id": "https://www.completemarquees.co.uk{{ page.url }}#primaryimage"
        },
        "thumbnailUrl": "{{ thumbnail_url }}",
        "datePublished": "{{ date_published }}",
        "dateModified": "{{ date_modified }}",
        "description": "{{ meta_description }}",
        "breadcrumb": {
          "@id": "https://www.completemarquees.co.uk{{ page.url }}#breadcrumb"
        },
        "inLanguage": "en-GB",
        "potentialAction": [{
          "@type": "ReadAction",
          "target": ["https://www.completemarquees.co.uk{{ page.url }}"]
        }]
      }, {
        "@type": "ImageObject",
        "inLanguage": "en-GB",
        "@id": "https://www.completemarquees.co.uk{{ page.url }}#primaryimage",
        "url": "{{ thumbnail_url }}",
        "contentUrl": "{{ thumbnail_url }}"
      }, {
        "@type": "BreadcrumbList",
        "@id": "https://www.completemarquees.co.uk{{ page.url }}#breadcrumb",
        "itemListElement": [{
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://www.completemarquees.co.uk/"
        }, {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ breadcrumb_name }}"
        }]
      {% include "schema-org-static.html" %}

{% include "location-header.html" %}


          {% assign breadcrumbCurrent = breadcrumb_name %}
          {% include "breadcrumbs.html" %}
{{ renderedDescription }}        </div><!-- 
       -->
        <div class="grid__item--third">

          <aside>

            <div class="content">

              {% include "sidebar-cta.html" %}

              {% include "sidebar-testimonials.html" %}

            </div>

          </aside>
{% if map_embed %}              <div class="area__map">
                <iframe src="{{ map_embed }}" allowfullscreen></iframe>
              </div>
{% endif %}
            </div>

          </aside>
        </div>

      </div>

    </main>

  </section>

  {% include "marquee-cards.html" %}

  {% include "site-footer.html" %}
</body>

</html>
