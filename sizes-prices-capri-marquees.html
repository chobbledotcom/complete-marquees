          <h1 class="entry-title">Sizes &amp; Prices</h1>
          <h2 data-section-id="1228uok" data-start="1267" data-end="1301">Marquee Hire – Sizes &amp; Prices</h2>
          <p data-start="1303" data-end="1590">Plan your next event with <strong data-start="1329" data-end="1350">Complete Marquees</strong>, offering high-quality <strong data-start="1374" data-end="1390">marquee hire</strong> for weddings, parties, corporate events, and garden celebrations throughout <strong data-start="1467" data-end="1505">Hampshire, Surrey, and West Sussex</strong>. Our modern marquees come in multiple sizes, making them perfect for any occasion.</p>
          <img fetchpriority="high" decoding="async" width="300" height="174" class="alignleft wp-image-45 size-medium" src="/wp-content/uploads/2016/06/marquee3-300x174.jpg" alt="Capri Marquees Winchester" srcset="../wp-content/uploads/2016/06/marquee3-300x174.jpg 300w, ../wp-content/uploads/2016/06/marquee3.jpg 690w" sizes="(max-width: 300px) 100vw, 300px" />
          <p>For larger events, link two or more Capri marquees to create custom layouts and unique shapes. You can also enhance your space with stunning lighting and décor that matches your theme. Keep in mind, Capri marquees require grass surfaces.</p>
          <p>&nbsp;</p>
          <img decoding="async" width="300" height="169" class="size-medium wp-image-366 alignright" src="/wp-content/uploads/2016/06/marqueeclient-300x169.jpg" alt="capri marquee hire" srcset="../wp-content/uploads/2016/06/marqueeclient-300x169.jpg 300w, ../wp-content/uploads/2016/06/marqueeclient.jpg 720w" sizes="(max-width: 300px) 100vw, 300px" />
          <hr />
          <h3></h3>
          <h2><img decoding="async" width="300" height="225" class="alignleft wp-image-41 size-medium" src="/wp-content/uploads/2016/06/pagoda-marquee-300x225.jpg" alt="Pagoda Marquees Surrey" srcset="../wp-content/uploads/2016/06/pagoda-marquee-300x225.jpg 300w, ../wp-content/uploads/2016/06/pagoda-marquee-768x576.jpg 768w, ../wp-content/uploads/2016/06/pagoda-marquee.jpg 816w" sizes="(max-width: 300px) 100vw, 300px" /></h2>
          <h2 data-section-id="fqzr03" data-start="2095" data-end="2116">Pagoda Marquees</h2>
          <p data-start="2117" data-end="2398">Our <strong data-start="2121" data-end="2140">Pagoda marquees</strong> feature a striking pitched roof that instantly elevates any event. Use the <strong data-start="2216" data-end="2237">Chinese Hat style</strong> as a standalone marquee or as an eye-catching entrance to a larger marquee. Skip the guy ropes, and adjust side walls on the day to suit your event perfectly.</p>
          <p data-start="2400" data-end="2619">Both Capri and Pagoda marquees offer flexible, elegant spaces that impress guests and enhance your celebration. Our team delivers, sets up, and collects each marquee efficiently, letting you enjoy the day stress-free.</p>
          <p data-start="2621" data-end="2814">Whether you plan a small garden party or a large corporate function, we provide the right marquee to make your event unforgettable. Contact Complete Marquees today to book your ideal marquee.</p>
          <img loading="lazy" decoding="async" width="300" height="225" class="alignnone size-medium wp-image-1043" src="/wp-content/uploads/2022/01/pagoda-300x225.jpg" alt="" srcset="../wp-content/uploads/2022/01/pagoda-300x225.jpg 300w, ../wp-content/uploads/2022/01/pagoda-1024x768.jpg 1024w, ../wp-content/uploads/2022/01/pagoda-768x576.jpg 768w, ../wp-content/uploads/2022/01/pagoda-1536x1152.jpg 1536w, ../wp-content/uploads/2022/01/pagoda-2048x1536.jpg 2048w" sizes="auto, (max-width: 300px) 100vw, 300px" />
          <h3 data-section-id="1dx8iea" data-start="2232" data-end="2267">Why Choose Complete Marquees?</h3>
          <p data-start="2268" data-end="2625">Both Capri and Pagoda marquees provide flexible, elegant spaces that impress guests and elevate your celebration. Our experienced team manages delivery, installation, and collection, ensuring a smooth, stress-free experience. We work closely with you to design layouts, choose sizes, and incorporate special features such as lighting, flooring, and décor.</p>
          <p data-start="2627" data-end="2968">Whether you are planning a small garden party, a large wedding, or a corporate function, Complete Marquees has the perfect solution. Browse our gallery to see real examples of our marquees in action, and contact us today to discuss your requirements. Secure your marquee hire and create an event that will be remembered by all your guests.</p>
          <p>&nbsp;</p>
