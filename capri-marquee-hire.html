          <h2>Our Gallery</h2>
          <p data-start="120" data-end="360">Welcome to our<strong data-start="135" data-end="155"> gallery</strong>. Here, you can explore a range of real event setups we have delivered. At Complete Marquees, we provide high-quality <strong data-start="273" data-end="289">marquee hire</strong> for weddings, corporate events, garden parties, and special occasions.</p>
          <p data-start="362" data-end="615">Our gallery features both <strong data-start="388" data-end="406">Capri</strong> and <strong data-start="411" data-end="430">Pagoda marquees</strong>. Each structure offers a modern, stylish look. You can use them for small gatherings or large-scale events. Need more space? We can link marquees together to create the perfect layout.</p>
